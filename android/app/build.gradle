plugins {
    id 'com.android.application'
    id 'kotlin-android'
    id 'dev.flutter.flutter-gradle-plugin'
//    id "org.jetbrains.kotlin.android" version "1.9.10" apply false


}


android {
    namespace = "com.example.placement"
    compileSdk = 35  // Update to your Flutter compileSdkVersion

    defaultConfig {
        applicationId = "com.example.placement"
        minSdk = 23  // Firebase requires at least 23 for some features
        targetSdk = 33
        versionCode 1
        versionName "1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    buildTypes {
        release {
            // Signing config (update if you have release keystore)
            signingConfig signingConfigs.debug
            // Optional minify settings
            // minifyEnabled false
            // proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

dependencies {
    implementation platform('com.google.firebase:firebase-bom:34.3.0')
    implementation 'com.google.firebase:firebase-analytics'
    implementation 'com.google.firebase:firebase-auth'
    implementation 'com.google.firebase:firebase-messaging'
    implementation 'com.google.android.gms:play-services-auth:20.7.0'

}

flutter {
    source = "../.."
}
